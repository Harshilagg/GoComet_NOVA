services:
  # 1. Backend Server (Node.js)
  - type: web
    name: gocomet-nova-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PYTHON_SERVICE_URL
        value: https://aggarwalharshil02-gocomet-nova.hf.space
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_BUCKET_NAME
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # 2. Frontend Client (Static Site)
  - type: web
    name: gocomet-nova-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
